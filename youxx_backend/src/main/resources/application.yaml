spring:
  profiles:
    active: dev
  application:
    name: YOUXX
  datasource:
    url: ${spring.datasource.url}
    driver-class-name: ${spring.datasource.driver-class-name}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
  data:
    redis:
      host: ${spring.data.redis.host}
      port: ${spring.data.redis.port}
      database: ${spring.data.redis.database}
      timeout: ${spring.data.redis.timeout}
      password: ${spring.data.redis.password}
  servlet:
    multipart:
      # 上传体积真正由后端压缩控制，此处仅兜底防超大文件
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8081

youxx:
  jwt:
    secret-key: youxx-jwt-secret-key-2026-secure-token
    ttl: 7200000
    token-name: token
  chatmodel:
    model: ${CHATMODEL_MODEL}
    api-key: ${CHATMODEL_API_KEY}
    base-url: ${CHATMODEL_BASE_URL}
    send-thinking: false
  resource:
    # 静态资源根目录(仓库根)，dev 环境在 application-dev.yaml 显式写死绝对路径
    base-dir: ${youxx.resource.base-dir}
